name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: 构建并发布到 ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 编译发布
        shell: bash
        run: |
          dotnet publish -c Release -r ${{ matrix.rid }} -o publish
          find publish/ -name "*.pdb" -delete
          find publish/ -name "*.dSYM" -exec rm -rf {} +

      - name: 平台相关处理
        shell: bash
        run: |
          if [ "${{ matrix.rid }}" = "linux-x64" ]; then
            cp RimeDictManager/Assets/Linux/rimedictmanager.desktop publish/
            cp RimeDictManager/Assets/Linux/install.sh publish/
            chmod +x publish/install.sh
            cp RimeDictManager/Assets/icon_256.png publish/
            cp RimeDictManager/Assets/icon_48.png publish/
          elif [ "${{ matrix.rid }}" = "osx-arm64" ]; then
            APP="RimeDictManager.app"
            mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
            mv publish/* "$APP/Contents/MacOS/"
            rmdir publish
            cp RimeDictManager/Assets/macOS/Info.plist "$APP/Contents/"
            cp RimeDictManager/Assets/icon.icns "$APP/Contents/Resources/"
          fi

      - name: 打包压缩
        shell: bash
        run: |
          DIR="RimeDictManager-${{ github.ref_name }}-${{ matrix.rid }}"
          if [ "${{ matrix.rid }}" = "linux-x64" ]; then
            mv publish $DIR
            cp CHANGELOG.md LICENSE README.md $DIR/
            tar -cJf $DIR.tar.xz $DIR
          elif [ "${{ matrix.rid }}" = "osx-arm64" ]; then
            DMG_ROOT="dmg-root"
            mkdir -p "$DMG_ROOT"
            cp -R "RimeDictManager.app" "$DMG_ROOT/"
            ln -s /Applications "$DMG_ROOT/Applications"
            cp CHANGELOG.md LICENSE README.md "$DMG_ROOT/"
            hdiutil create -volname "RimeDictManager" -srcfolder "$DMG_ROOT" -ov -format UDZO "$DIR.dmg"
          else
            mv publish $DIR
            cp CHANGELOG.md LICENSE README.md $DIR/
            7z a -t7z -m0=lzma2 -mx=9 $DIR.7z $DIR
          fi

      - name: 上传发布
        uses: softprops/action-gh-release@v3
        with:
          files: |
            *.7z
            *.tar.xz
            *.dmg
