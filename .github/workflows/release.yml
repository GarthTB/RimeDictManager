name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: 构建并发布到 ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-arm64

    steps:
      - name: 检出代码
        uses: actions/checkout@v6

      - name: 安装 .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: 编译发布
        run: dotnet publish -c Release -r ${{ matrix.rid }} -o publish

      - name: 打包压缩
        shell: bash
        run: |
          cp CHANGELOG.md LICENSE README.md publish/
          find publish/ -name "*.pdb" -exec rm -f {} +
          find publish/ -name "*.dSYM" -exec rm -rf {} +
          DIR="RimeDictManager-${{ github.ref_name }}-${{ matrix.rid }}"
          mv publish "$DIR"
          7z a -t7z -m0=lzma2 -mx=9 "${DIR}.7z" "$DIR"

      - name: 上传发布
        uses: softprops/action-gh-release@v3
        with:
          files: '*.7z'
